name: orchestrator

on:
  push:
    paths:
      - "orchestrator/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/orchestrator.yml"
  pull_request:
    paths:
      - "orchestrator/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/orchestrator.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    # Redis is managed by testcontainers — no service container needed.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "./orchestrator[dev]"

      - name: Lint
        run: ruff check orchestrator/src orchestrator/tests

      - name: Unit tests
        run: pytest orchestrator/tests/unit -v

      - name: Integration tests
        run: pytest orchestrator/tests/integration -v -m "not hardware"

      - name: E2E tests
        run: pytest orchestrator/tests/e2e -v -m "not hardware"
